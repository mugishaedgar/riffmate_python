{% extends "base.html" %}
{% load static %}

{% block title %}RiffMates News{% endblock %}

{% block content %}
<div class="welcome-section">
    <div class="container">
        <h1 class="display-5 fw-bold mb-4">Welcome to RiffMates News</h1>
        <p class="lead mb-5 opacity-90">
            Dive into the rhythm of real stories, breaking updates, and music that
            speaks. This is where riffs meet reality.
        </p>
        <a href="{% url 'news' %}" class="btn btn-primary btn-lg px-5 py-3">
            Start Reading
        </a>
    </div>
</div>
<style>
    .welcome-section {
        min-height: 60vh;
        background: linear-gradient(135deg, var(--primary-color), #4c6ba5);
        color: var(--secondary-color);
        display: flex;
        align-items: center;
        padding: 4rem 2rem;
        text-align: center;
    }
    
    .welcome-section h1 {
        letter-spacing: -0.5px;
        color: var(--secondary-color);
    }
    
    .welcome-section .btn-primary {
        font-size: 1.25rem;
        border-radius: 50px;
        transition: all 0.3s ease;
    }
    
    .welcome-section .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
</style>
{% endblock %}

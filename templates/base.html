<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap 5 CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>{% block title %}RiffMates{% endblock %}</title>
    <style>
      :root {
        --primary-color: #607EBC;
        --secondary-color: #fff;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      
      .navbar {
        background: var(--primary-color) !important;
        padding: 1rem 0;
      }
      
      .navbar-brand {
        color: var(--secondary-color) !important;
        font-size: 1.5rem;
        letter-spacing: -0.5px;
      }
      
      .navbar a {
        color: var(--secondary-color) !important;
        font-weight: 500;
        transition: all 0.3s ease;
        padding: 0.5rem 1rem;
        border-radius: 4px;
      }
      
      .navbar a:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: translateY(-1px);
      }
      
      main {
        background: var(--secondary-color);
        border-radius: 8px;
        margin-top: 2rem !important;
      }
      
      footer {
        background: var(--primary-color) !important;
        color: var(--secondary-color) !important;
        padding: 1.5rem 0 !important;
      }
      
      .btn-primary {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
        padding: 0.5rem 1.5rem;
      }
      
      .btn-primary:hover {
        background-color: #4c6ba5;
        border-color: #4c6ba5;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="min-vh-100 d-flex flex-column">
      {% block nav %}
      <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container">
          <a class="navbar-brand fw-bold" href="{% url 'home' %}">RiffMates</a>
          <div class="ms-auto d-flex align-items-center">
            <a href="{% url 'news' %}" class="text-decoration-none me-3">
              News
            </a>
            <a href="{% url 'musician_list' %}" class="text-decoration-none me-3">
              Musicians
            </a>
            <a href="{% url 'band_list' %}" class="text-decoration-none me-3">
              Bands
            </a>
            <a href="{% url 'venue_list' %}" class="text-decoration-none me-3">
              Venues
            </a>
          </div>
        </div>
      </nav>
      {% endblock nav %}

      <main class="container flex-grow-1 py-4 px-4 shadow-sm">
        {% block content %}{% endblock content %}
      </main>

      {% block footer %}
      <footer class="text-center mt-auto">
        <div class="container">
          &copy; {{ year|default:"2025" }} RiffMates. All rights reserved.
        </div>
      </footer>
      {% endblock footer %}
    </div>

    <!-- Bootstrap 5 JS (optional, for components that need JS) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
